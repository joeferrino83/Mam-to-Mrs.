<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mam to Mrs. | Nashville 2026</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Monoton&family=Rye&family=Special+Elite&display=swap');

:root {
    --neon-pink: #ff7adf;
    --gold: #d49b3c;
    --dark-wood: #2c1d10;
    --leather: #3b2415;
}

body {
    font-family: 'Special Elite', cursive; /* Typewriter feel for that vintage bar look */
    margin: 0;
    color: #f7e6c7;
    text-align: center;
    overflow-x: hidden;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                url("https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?q=80&w=2070&auto=format&fit=crop");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

header { padding: 60px 20px; }

/* --- ENHANCED NEON SIGN --- */
@keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        text-shadow: 0 0 8px var(--neon-pink), 0 0 15px var(--neon-pink), 0 0 30px #ff2cc3;
        color: var(--neon-pink);
    }
    20%, 24%, 55% {
        text-shadow: none;
        color: #441a3a;
    }
}

.neonBarSign {
    font-family: "Monoton", cursive;
    font-size: clamp(40px, 8vw, 80px);
    padding: 30px 50px;
    display: inline-block;
    background: #000;
    border-radius: 20px;
    border: 6px double var(--gold);
    animation: flicker 5s infinite alternate;
    box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(194,139,48,0.3);
}

.container { max-width: 900px; margin: auto; padding: 20px; }

/* --- LUXE CARDS --- */
.card {
    background: rgba(27, 18, 11, 0.9);
    backdrop-filter: blur(10px);
    border: 2px solid var(--gold);
    padding: 30px;
    margin: 30px auto;
    border-radius: 12px;
    box-shadow: 10px 10px 20px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border: 1px solid rgba(212, 155, 60, 0.2);
    pointer-events: none;
    margin: 5px;
}

h2 { 
    font-family: 'Rye', cursive; 
    color: var(--gold); 
    font-size: 2rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px #000;
}

/* --- INTERACTIVE BUTTONS --- */
button {
    background: var(--gold);
    color: #1b1207;
    border: 1px solid #000;
    padding: 14px 28px;
    margin: 10px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    font-family: 'Rye', cursive;
    text-transform: uppercase;
    transition: all 0.3s ease;
    box-shadow: 4px 4px 0px #7d5a22;
}

button:hover { 
    background: var(--neon-pink); 
    color: #fff; 
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 15px rgba(255, 122, 223, 0.4);
}

button:active {
    transform: translate(1px, 1px);
    box-shadow: 2px 2px 0px #7d5a22;
}

input[type="text"], input[type="file"] {
    background: #1b1207;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 10px;
    margin: 5px;
    border-radius: 4px;
    font-family: 'Special Elite', cursive;
}

/* --- PHOTO WALL GRID --- */
.photoGrid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
    gap: 15px; 
    margin-top: 20px;
}

.photoGrid img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    border-radius: 4px;
    border: 3px solid #fff;
    box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    transition: transform 0.3s;
}

.photoGrid img:hover { transform: scale(1.05) rotate(2deg); z-index: 10; }

#powerBarDisplay {
    font-size: 28px;
    font-weight: bold;
    color: var(--neon-pink);
    text-shadow: 0 0 10px var(--neon-pink);
}

.checkbox-row {
    text-align: left;
    padding: 8px;
    border-bottom: 1px dotted rgba(212, 155, 60, 0.3);
}

/* --- LEADERBOARD STYLE --- */
.leader-item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    font-size: 1.2rem;
}

</style>
</head>

<body>

<header>
    <div class="neonBarSign">Mam to Mrs.</div>
</header>

<div class="container">

    <h2><span style="color:var(--neon-pink)">01.</span> The Posse</h2>
    <div class="card" id="playerSetup"></div>

    <h2><span style="color:var(--neon-pink)">02.</span> Saloon Drinks</h2>
    <div class="card">
        <div id="drinkDisplay" style="font-size: 1.5rem; margin-bottom: 15px;">Ready to Pour?</div>
        <button onclick="generateDrink()">Shake it Up</button>
    </div>

    <h2><span style="color:var(--neon-pink)">03.</span> The High Roller</h2>
    <div class="card">
        <div id="wheelResult" style="font-size: 1.5rem; height: 40px;">Spin the Wheel...</div>
        <button onclick="spinWheel()">Spin Wheel</button>
    </div>

    <h2><span style="color:var(--neon-pink)">04.</span> Photo Wall</h2>
    <div class="card">
        <input type="file" id="photoUpload" accept="image/*">
        <div class="photoGrid" id="photoGrid"></div>
        <div style="margin-top:20px;">
            <button onclick="downloadAllPhotos()" style="background:#2e7d32; color:white;">Download All</button>
            <button onclick="clearPhotos()" style="background:#631010; color:white;">Clear Gallery</button>
        </div>
    </div>

    <h2><span style="color:var(--neon-pink)">05.</span> Cowboy Scavenger</h2>
    <div class="card" id="cowboyHunt"></div>

    <h2><span style="color:var(--neon-pink)">06.</span> Bar Tracker</h2>
    <div class="card" id="barTracker"></div>

    <h2><span style="color:var(--neon-pink)">07.</span> Power Level</h2>
    <div class="card">
        <div id="powerBarDisplay">Power Level: 0</div>
    </div>

    <h2><span style="color:var(--neon-pink)">08.</span> Daily Tasks</h2>
    <div id="tasks"></div>

    <h2><span style="color:var(--neon-pink)">09.</span> Top Cowgirls</h2>
    <div class="card" id="leaderboard"></div>

    <button onclick="resetGame()" style="background:#333; color:white; font-family:sans-serif; margin-top:50px;">FACTORY RESET APP</button>

</div>

<script>
let players = [];
let powerBar = 0;
const TASKS_PER_PLAYER = 5;

const taskPool = ["Start a dance circle","Get a stranger to yeehaw","Selfie with cowboy hat","Start group toast","Teach a line dance","Compliment 5 strangers","Sing a country lyric loudly","Convince someone it's your birthday","Start Mam to Mrs chant","Lead the group to the next bar","Buy the bride a drink","Boot stomp dance","Karaoke with strangers","Teach Nashville slang","Photo with security","Find someone from another state","Start a yeehaw chant","Line dance with a stranger","Group selfie with strangers","Order a round","Find someone wearing boots","Convince someone to sing karaoke","High five 10 people","Lead a bar cheer","Get a stranger to shout Bride!","Selfie with bartender","Find someone from Texas","Find someone celebrating something","Start cheers with strangers","Matching boots photo","Get someone to sing with you","Ask a stranger to dance","Find someone with a mullet","Take a shot with a stranger","Get someone to yell yeehaw","Teach boot scoot step","Photo with fringe jacket","Find southern accent","Start a dance off","Selfie with bachelorette group","Find someone wearing denim","Ask favorite country song","Get strangers to toast bride","Convince stranger group photo","Find someone named Jake","Start clap chant","Get someone to buy bride drink","Teach line dance step","Get crowd to cheer bride","Start boot stomp rhythm"];
const brideEvents = ["👰 Bride Rule: Everyone toast the bride!","👰 Tell your favorite story about Arona.","👰 Everyone compliment the bride.","👰 Someone buy the bride a drink.","👰 Group hug the bride!","👰 Everyone shout ARONA!","👰 Serenade the bride with a country lyric.","👰 Bride assigns 3 drinks.","👰 Everyone cheers loudly for the bride!","👰 Share a funny memory about Arona.","👰 Bride chooses next bar!","👰 Everyone selfie with the bride.","👰 Chant Mam to Mrs!","👰 Everyone clap for the bride!","👰 Tell how you met Arona."];
const drinks = ["Cowgirl Margarita","Boot Scootin Lemon Drop","Rodeo Ranch Water","Pink Saddle Shot","Honky Tonk Tequila","Wild West Watermelon Shot","Peach Whiskey Smash","Tennessee Mule","Blueberry Lemon Drop","Cherry Bomb Shot","Pineapple Tequila Splash","Strawberry Margarita","Salted Caramel Whiskey Shot","Raspberry Vodka Fizz","Fireball Apple Shot","Mint Julep"];
const wheelOptions = ["Take a Shot","Make Someone Drink","Bride Drinks","Dance Break","Water Break","Spin Again","Group Cheers","Everyone Drinks","Sing Country Lyric","Line Dance Break","Shot with Stranger","Trade Drinks","Tell Embarrassing Story","Group Selfie","Chug Drink","Yeehaw Contest"];
const cowboyTasks = ["Find cowboy boots","Get someone to yeehaw","Photo with hat","Start line dance","Find someone from Texas","Find mustache","Find bolo tie","Find cowboy hat","Find fringe jacket","Find mullet","Matching boots photo","Find denim outfit","Find big belt buckle"];
let barList = ["Tootsies Orchid Lounge","Jason Aldean's Kitchen","Luke's 32 Bridge","Kid Rock's Honky Tonk"];

function initPlayers() {
    let saved = localStorage.getItem("players");
    if (saved) {
        players = JSON.parse(saved);
    } else {
        for (let i = 1; i <= 8; i++) { // Default to 8 players
            players.push({ name: "Player " + i, drinks: 0, tasks: [], completed: [] });
        }
        assignTasks();
    }
}

function assignTasks() {
    let shuffled = [...taskPool].sort(() => Math.random() - 0.5);
    let index = 0;
    players.forEach(p => {
        p.tasks = shuffled.slice(index, index + TASKS_PER_PLAYER);
        p.completed = new Array(TASKS_PER_PLAYER).fill(false);
        index += TASKS_PER_PLAYER;
    });
}

function save() { localStorage.setItem("players", JSON.stringify(players)); }

function renderPlayerSetup() {
    let div = document.getElementById("playerSetup");
    div.innerHTML = "";
    players.forEach((p, i) => {
        let input = document.createElement("input");
        input.type = "text";
        input.value = p.name;
        input.onchange = () => {
            players[i].name = input.value;
            save();
            renderTasks();
            renderLeaderboard();
        };
        div.appendChild(input);
    });
}

function renderTasks() {
    let c = document.getElementById("tasks");
    c.innerHTML = "";
    players.forEach((p, pi) => {
        let html = `<div class="card"><h3 style="font-family:'Rye'">${p.name}</h3>`;
        p.tasks.forEach((task, ti) => {
            html += `<div class="checkbox-row"><input type="checkbox" ${p.completed[ti] ? "checked" : ""} 
                    onclick="completeTask(${pi}, ${ti})"> ${task}</div>`;
        });
        html += `<button onclick="addDrink('${p.name}')">Add Drink 🍺</button></div>`;
        c.innerHTML += html;
    });
    updatePowerLevel();
}

function completeTask(pi, ti) {
    players[pi].completed[ti] = !players[pi].completed[ti];
    if (players[pi].completed[ti]) triggerBrideEvent();
    save();
    renderTasks();
}

function updatePowerLevel() {
    powerBar = players.reduce((acc, p) => acc + p.completed.filter(c => c).length, 0);
    document.getElementById("powerBarDisplay").innerText = `Power Level: ${powerBar}`;
}

function triggerBrideEvent() {
    if (Math.random() < 0.25) {
        let event = brideEvents[Math.floor(Math.random() * brideEvents.length)];
        setTimeout(() => alert(event), 200);
    }
}

function addDrink(name) {
    let p = players.find(x => x.name === name);
    p.drinks++;
    save();
    renderLeaderboard();
}

function renderLeaderboard() {
    let b = document.getElementById("leaderboard");
    b.innerHTML = "";
    let sorted = [...players].sort((a, b) => b.drinks - a.drinks);
    sorted.forEach((p, i) => {
        let crown = (i === 0 && p.drinks > 0) ? "👑 " : "";
        b.innerHTML += `<div class="leader-item"><span>${crown}${p.name}</span> <span>${p.drinks} Drinks</span></div>`;
    });
}

function generateDrink() { document.getElementById("drinkDisplay").innerText = drinks[Math.floor(Math.random() * drinks.length)]; }

function spinWheel() {
    let div = document.getElementById("wheelResult");
    let spins = 20; let i = 0;
    let interval = setInterval(() => {
        div.innerText = wheelOptions[Math.floor(Math.random() * wheelOptions.length)];
        div.style.color = (i % 2 == 0) ? "var(--neon-pink)" : "var(--gold)";
        if (++i > spins) {
            clearInterval(interval);
            div.style.color = "var(--neon-pink)";
        }
    }, 80);
}

function renderChecklist(list, id) {
    let div = document.getElementById(id);
    list.forEach(item => {
        let row = document.createElement("div");
        row.className = "checkbox-row";
        row.innerHTML = `<input type="checkbox"> ${item}`;
        div.appendChild(row);
    });
}

function renderBars() {
    let saved = localStorage.getItem("bars");
    if (saved) barList = JSON.parse(saved);
    let div = document.getElementById("barTracker");
    div.innerHTML = "";
    barList.forEach(bar => {
        let row = document.createElement("div");
        row.className = "checkbox-row";
        row.innerHTML = `<input type="checkbox"> ${bar}`;
        div.appendChild(row);
    });
    let input = document.createElement("input");
    input.placeholder = "New Stop...";
    let btn = document.createElement("button");
    btn.innerText = "+";
    btn.onclick = () => {
        if(input.value) {
            barList.push(input.value);
            localStorage.setItem("bars", JSON.stringify(barList));
            renderBars();
        }
    };
    div.append(document.createElement("br"), input, btn);
}

/* --- PHOTO STORAGE & DOWNLOAD --- */
document.getElementById("photoUpload").addEventListener("change", function() {
    if (!this.files[0]) return;
    const reader = new FileReader();
    reader.readAsDataURL(this.files[0]);
    reader.onload = function(event) {
        const img = new Image();
        img.src = event.target.result;
        img.onload = function() {
            const canvas = document.createElement("canvas");
            const MAX_WIDTH = 600;
            const scale = MAX_WIDTH / img.width;
            canvas.width = MAX_WIDTH;
            canvas.height = img.height * scale;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const compressed = canvas.toDataURL("image/jpeg", 0.7);
            displayPhoto(compressed);
            savePhoto(compressed);
        };
    };
});

function displayPhoto(src) {
    let img = document.createElement("img");
    img.src = src;
    img.onclick = () => { // Individual download on click
        const link = document.createElement('a');
        link.href = src;
        link.download = `Nashville_Memory_${Date.now()}.jpg`;
        link.click();
    };
    document.getElementById("photoGrid").appendChild(img);
}

function savePhoto(src) {
    let photos = JSON.parse(localStorage.getItem("photos") || "[]");
    photos.push(src);
    try { localStorage.setItem("photos", JSON.stringify(photos)); } catch (e) { alert("Vault is full!"); }
}

function loadPhotos() {
    let photos = JSON.parse(localStorage.getItem("photos") || "[]");
    photos.forEach(displayPhoto);
}

function downloadAllPhotos() {
    let photos = JSON.parse(localStorage.getItem("photos") || "[]");
    if(photos.length === 0) return alert("No photos yet!");
    photos.forEach((src, idx) => {
        setTimeout(() => {
            const link = document.createElement('a');
            link.href = src;
            link.download = `MamToMrs_Photo_${idx}.jpg`;
            link.click();
        }, idx * 300); // Staggered downloads
    });
}

function clearPhotos() {
    if(confirm("Burn the evidence? (Clear Gallery)")) {
        localStorage.removeItem("photos");
        document.getElementById("photoGrid").innerHTML = "";
    }
}

function resetGame() {
    if(confirm("THIS WILL DELETE EVERYTHING. Continue?")) {
        localStorage.clear();
        location.reload();
    }
}

initPlayers();
renderPlayerSetup();
renderTasks();
renderLeaderboard();
renderChecklist(cowboyTasks, "cowboyHunt");
renderBars();
loadPhotos();
</script>

</body>
</html>

<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mam to Mrs.</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Monoton&family=Rye&display=swap');

/* Animated Pink Party Background */

body{
font-family:'Trebuchet MS', sans-serif;
margin:0;
color:white;
text-align:center;

background:linear-gradient(
135deg,
#ff8fd1,
#ff4fa3,
#ffb3e6,
#ff6fb5
);

background-size:400% 400%;
animation:partyGradient 12s ease infinite;
}

@keyframes partyGradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating hearts */

body::after{
content:"💖 💕 🥂 💖 💕 🥂";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
opacity:0.08;
font-size:120px;
pointer-events:none;
}

/* Neon title */

.neonBarSign{
font-family:"Monoton",cursive;
font-size:70px;
color:#ff69b4;
letter-spacing:8px;
padding:26px 60px;
display:inline-block;
background:#120b06;
border-radius:18px;
border:8px solid #ff69b4;

text-shadow:
0 0 10px #ff69b4,
0 0 20px #ff69b4,
0 0 40px #ff1493,
0 0 80px #ff1493;

margin-top:40px;
}

/* Layout */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,0.15);
border:2px solid #ff69b4;
padding:24px;
margin:20px auto;
border-radius:16px;
max-width:720px;
backdrop-filter:blur(6px);
}

button{
background:#ff69b4;
color:white;
border:none;
padding:12px 24px;
margin:10px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
font-size:16px;
}

button:hover{
background:#ff1493;
}

/* Wheel */

canvas{
background:#120b06;
border-radius:50%;
border:8px solid #ff69b4;
}

</style>

</head>

<body>

<header>
<div class="neonBarSign">Mam to Mrs.</div>
</header>

<div class="container">

<h2>👢 Player Setup</h2>
<div class="card" id="playerSetup"></div>

<h2>👰 Bride Mode</h2>
<div class="card">
<button onclick="toggleBrideMode()">Toggle Bride Mode</button>
<div id="brideStatus">Bride Mode: OFF</div>
</div>

<h2>🎡 Drinking Wheel</h2>

<canvas id="wheelCanvas" width="320" height="320"></canvas> <br> <button onclick="spinWheel()">Spin Wheel</button>

<div class="card" id="wheelResult"></div>

<h2>🍹 Drink Generator</h2>
<div class="card" id="drinkDisplay">Press button!</div>
<button onclick="generateDrink()">Generate Drink</button>

<h2>🎤 Karaoke Dare</h2>
<div class="card" id="karaokeDisplay">Press button!</div>
<button onclick="generateKaraoke()">Generate Dare</button>

<h2>🎯 Player Tasks</h2>
<div id="tasks"></div>

<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>

</div>

<script>

/* GLOBAL */

let players=[]
let powerBar=0
let brideMode=false

const TASKS_PER_PLAYER=5

/* 50 TASKS */

const taskPool=[

"Start dance circle","Get stranger to yeehaw","Selfie with cowboy hat","Start group toast",
"Teach line dance","Compliment strangers","Sing country lyric","Convince someone birthday",
"Start Mam to Mrs chant","Lead next bar","Buy bride drink","Boot stomp dance",
"Karaoke with strangers","Teach Nashville slang","Photo with security","Find another state",
"Start yeehaw chant","Line dance with stranger","Group selfie","Order a round",
"Find boots","Convince someone to sing","High five 10 people","Lead bar cheer",
"Get stranger to shout Bride","Selfie with bartender","Find someone from Texas",
"Find celebration group","Start cheers with strangers","Matching boots photo",
"Ask stranger to dance","Find mullet","Take shot with stranger","Get someone yelling yeehaw",
"Teach boot scoot","Photo with fringe","Find southern accent","Start dance off",
"Selfie with bachelorette group","Find denim outfit","Ask favorite country song",
"Get strangers toast bride","Convince stranger group photo","Find someone named Jake",
"Start clap chant","Get someone buy bride drink","Teach line dance step",
"Get crowd cheer bride","Start boot stomp rhythm"

]

/* BRIDE POWERS */

const bridePowers=[

"👰 Bride chooses next bar!",
"👰 Bride assigns 3 drinks!",
"👰 Bride skips next drink!",
"👰 Everyone cheers for the bride!",
"👰 Someone must buy bride drink!",
"👰 Bride forces group dance!",
"👰 Bride selects karaoke singer!",
"👰 Bride picks someone to chug!",
"👰 Group chant Mam to Mrs!",
"👰 Bride creates new rule!"

]

/* WHEEL OPTIONS */

const wheelOptions=[

"Take Shot","Make Someone Drink","Bride Drinks","Dance Break","Water Break",
"Group Cheers","Everyone Drinks","Sing Country Lyric","Line Dance Break",
"Shot with Stranger","Trade Drinks","Tell Embarrassing Story",
"Group Selfie","Chug Drink","Yeehaw Contest"

]

/* WHEEL DRAWING */

const canvas=document.getElementById("wheelCanvas")
const ctx=canvas.getContext("2d")

let angle=0

function drawWheel(){

let arc=(Math.PI*2)/wheelOptions.length

for(let i=0;i<wheelOptions.length;i++){

let start=angle+i*arc

ctx.fillStyle=i%2?"#ff69b4":"#ff1493"

ctx.beginPath()
ctx.moveTo(160,160)
ctx.arc(160,160,160,start,start+arc)
ctx.fill()

ctx.save()
ctx.translate(160,160)
ctx.rotate(start+arc/2)

ctx.fillStyle="#fff"
ctx.fillText(wheelOptions[i],80,0)

ctx.restore()

}

}

drawWheel()

/* SPIN WHEEL */

function spinWheel(){

let spin=Math.random()*2000+2000
let duration=3000
let start=Date.now()

function animate(){

let elapsed=Date.now()-start

angle+=spin/100000

ctx.clearRect(0,0,320,320)

drawWheel()

if(elapsed<duration){

requestAnimationFrame(animate)

}else{

let index=Math.floor(Math.random()*wheelOptions.length)

document.getElementById("wheelResult").innerText=wheelOptions[index]

}

}

animate()

}

/* BRIDE MODE */

function toggleBrideMode(){

brideMode=!brideMode

document.getElementById("brideStatus").innerText=
"Bride Mode: "+(brideMode?"ON":"OFF")

}

function triggerBridePower(){

if(brideMode && Math.random()<0.25){

let event=bridePowers[Math.floor(Math.random()*bridePowers.length)]

setTimeout(()=>alert(event),200)

}

}

/* CONFETTI */

function confetti(){

for(let i=0;i<50;i++){

let div=document.createElement("div")

div.innerText="🎉"

div.style.position="fixed"
div.style.left=Math.random()*100+"vw"
div.style.top="-20px"
div.style.fontSize="24px"

document.body.appendChild(div)

let fall=setInterval(()=>{

div.style.top=parseInt(div.style.top)+5+"px"

if(parseInt(div.style.top)>window.innerHeight){

clearInterval(fall)
div.remove()

}

},20)

}

}

/* TASK ASSIGNMENT */

function assignTasks(){

let shuffled=[...taskPool].sort(()=>Math.random()-0.5)

let index=0

players.forEach(p=>{

p.tasks=shuffled.slice(index,index+TASKS_PER_PLAYER)

p.completed=new Array(TASKS_PER_PLAYER).fill(false)

index+=TASKS_PER_PLAYER

})

}

/* PLAYERS */

function initPlayers(){

for(let i=1;i<=10;i++){

players.push({
name:"Player "+i,
drinks:0,
tasks:[],
completed:[]
})

}

assignTasks()

}

/* PLAYER SETUP */

function renderPlayerSetup(){

let div=document.getElementById("playerSetup")

players.forEach((p,i)=>{

let input=document.createElement("input")
input.value=p.name

input.onchange=()=>{
players[i].name=input.value
renderTasks()
renderLeaderboard()
}

div.appendChild(input)

})

}

/* TASK DISPLAY */

function renderTasks(){

let c=document.getElementById("tasks")
c.innerHTML=""

players.forEach((p,pi)=>{

let html=`<div class="card"><b>${p.name}</b><br>`

p.tasks.forEach((task,ti)=>{

html+=`
<div>
<input type="checkbox"
${p.completed[ti]?"checked":""}
onclick="completeTask(${pi},${ti})">
${task}
</div>`

})

html+=`<button onclick="addDrink('${p.name}')">Add Drink</button></div>`

c.innerHTML+=html

})

}

/* COMPLETE TASK */

function completeTask(playerIndex,taskIndex){

if(!players[playerIndex].completed[taskIndex]){

players[playerIndex].completed[taskIndex]=true

powerBar++

confetti()

triggerBridePower()

}

renderTasks()

}

/* DRINKS */

function addDrink(name){

let p=players.find(x=>x.name===name)
p.drinks++

renderLeaderboard()

}

/* LEADERBOARD */

function renderLeaderboard(){

let b=document.getElementById("leaderboard")
b.innerHTML=""

let sorted=[...players].sort((a,b)=>b.drinks-a.drinks)

sorted.forEach((p,i)=>{

let crown=i===0?"👑 ":""

b.innerHTML+=`<div class="card">${crown}${p.name}: ${p.drinks}</div>`

})

}

/* DRINK GENERATOR */

function generateDrink(){

const drinks=[
"Cowgirl Margarita",
"Boot Scootin Lemon Drop",
"Rodeo Ranch Water",
"Pink Saddle Shot",
"Honky Tonk Tequila"
]

document.getElementById("drinkDisplay").innerText=
drinks[Math.floor(Math.random()*drinks.length)]

}

/* KARAOKE */

function generateKaraoke(){

const karaoke=[
"Sing country song dramatically",
"Duet with stranger",
"Line dance while singing",
"Southern accent singing",
"Serenade the bride"
]

document.getElementById("karaokeDisplay").innerText=
karaoke[Math.floor(Math.random()*karaoke.length)]

}

/* INIT */

initPlayers()
renderPlayerSetup()
renderTasks()
renderLeaderboard()

</script>

</body>
</html>

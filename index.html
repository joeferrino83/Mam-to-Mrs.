<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mam to Mrs.</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Monoton&family=Rye&display=swap');

body{
font-family:'Trebuchet MS', sans-serif;
margin:0;
color:white;
text-align:center;

background:
linear-gradient(
135deg,
#ff8fd1,
#ff4fa3,
#ffb3e6,
#ff6fb5
);

background-size:400% 400%;
animation:partyGradient 12s ease infinite;
}

@keyframes partyGradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

header{margin-top:40px}

.neonBarSign{
font-family:"Monoton",cursive;
font-size:70px;
color:#ff7adf;
letter-spacing:8px;
padding:26px 60px;
display:inline-block;
background:#120b06;
border-radius:18px;
border:10px solid #c28b30;
text-shadow:0 0 6px #ff7adf,0 0 12px #ff4fd8,0 0 24px #ff2cc3;
}

.container{max-width:1100px;margin:auto;padding:20px}

.card{
background:rgba(44,29,16,.85);
border:3px solid #d49b3c;
padding:24px;
margin:20px auto;
border-radius:16px;
max-width:720px;
}

h2{font-family:'Rye', cursive}

button{
background:#d49b3c;
color:#1b1207;
border:none;
padding:12px 24px;
margin:10px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

input{padding:8px;margin:5px;border-radius:8px;border:none}

.photoGrid{display:flex;flex-wrap:wrap;justify-content:center}

.photoGrid img{
width:140px;
border-radius:10px;
margin:6px;
border:3px solid #c28b30;
}

</style>
</head>

<body>

<header>
<div class="neonBarSign">Mam to Mrs.</div>
</header>

<div class="container">

<h2>👢 Player Setup</h2>
<div class="card" id="playerSetup"></div>

<h2>🍹 Drink Generator</h2>
<div class="card" id="drinkDisplay">Press button!</div>
<button onclick="generateDrink()">Generate Drink</button>

<h2>🎡 Drinking Wheel</h2>
<button onclick="spinWheel()">Spin</button>
<div class="card" id="wheelResult"></div>

<h2>🎤 Karaoke Dare</h2>
<div class="card" id="karaokeDisplay">Press button!</div>
<button onclick="generateKaraoke()">Generate Dare</button>

<h2>📸 Photo Memories</h2>
<div class="card">
<input type="file" id="photoUpload">
<div class="photoGrid" id="photoGrid"></div>
</div>

<h2>🤠 Cowboy Hunt</h2>
<div class="card" id="cowboyHunt"></div>

<h2>🍻 Nashville Bar Crawl</h2>
<div class="card" id="barTracker"></div>

<h2>⚡ Cowgirl Power Bar</h2>
<div class="card">
<div id="powerBarDisplay">Power Level: 0</div>
</div>

<h2>🎯 Player Tasks</h2>
<div id="tasks"></div>

<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>

</div>

<script>

/* ---------------------------
GLOBAL VARIABLES
--------------------------- */

let players=[];
let powerBar=0;
const TASKS_PER_PLAYER=5;

/* ---------------------------
50 TASKS
--------------------------- */

const taskPool=[
"Start a dance circle","Get a stranger to yeehaw","Selfie with cowboy hat","Start group toast",
"Teach a line dance","Compliment 5 strangers","Sing a country lyric loudly","Convince someone it's your birthday",
"Start Mam to Mrs chant","Lead the group to the next bar","Buy the bride a drink","Boot stomp dance",
"Karaoke with strangers","Teach Nashville slang","Photo with security","Find someone from another state",
"Start a yeehaw chant","Line dance with a stranger","Group selfie with strangers","Order a round",
"Find someone wearing boots","Convince someone to sing karaoke","High five 10 people","Lead a bar cheer",
"Get a stranger to shout Bride!","Selfie with bartender","Find someone from Texas","Find someone celebrating something",
"Start cheers with strangers","Matching boots photo","Get someone to sing with you","Ask a stranger to dance",
"Find someone with a mullet","Take a shot with a stranger","Get someone to yell yeehaw","Teach boot scoot step",
"Photo with fringe jacket","Find southern accent","Start a dance off","Selfie with bachelorette group",
"Find someone wearing denim","Ask favorite country song","Get strangers to toast bride","Convince stranger group photo",
"Find someone named Jake","Start clap chant","Get someone to buy bride drink","Teach line dance step",
"Get crowd to cheer bride","Start boot stomp rhythm"
];

/* ---------------------------
BRIDE EVENTS
--------------------------- */

const brideEvents=[
"👰 Bride Rule: Everyone toast the bride!",
"👰 Tell your favorite story about Arona.",
"👰 Everyone compliment the bride.",
"👰 Someone buy the bride a drink.",
"👰 Group hug the bride!",
"👰 Everyone shout ARONA!",
"👰 Serenade the bride with a country lyric.",
"👰 Bride assigns 3 drinks.",
"👰 Everyone cheers loudly for the bride!",
"👰 Share a funny memory about Arona.",
"👰 Bride chooses next bar!",
"👰 Everyone selfie with the bride.",
"👰 Chant Mam to Mrs!",
"👰 Everyone clap for the bride!",
"👰 Tell how you met Arona."
];

/* ---------------------------
OTHER LISTS
--------------------------- */

const drinks=[
"Cowgirl Margarita","Boot Scootin Lemon Drop","Rodeo Ranch Water","Pink Saddle Shot",
"Honky Tonk Tequila","Wild West Watermelon Shot","Peach Whiskey Smash","Tennessee Mule",
"Blueberry Lemon Drop","Cherry Bomb Shot","Pineapple Tequila Splash","Strawberry Margarita",
"Salted Caramel Whiskey Shot","Raspberry Vodka Fizz","Fireball Apple Shot","Mint Julep"
];

const karaoke=[
"Sing dramatically","Duet with stranger","Line dance while singing","Southern accent singing",
"Group karaoke","Serenade the bride","Sing standing on chair"
];

const wheelOptions=[
"Take a Shot","Make Someone Drink","Bride Drinks","Dance Break","Water Break","Spin Again",
"Group Cheers","Everyone Drinks","Sing Country Lyric","Line Dance Break","Shot with Stranger",
"Trade Drinks","Tell Embarrassing Story","Group Selfie","Chug Drink","Yeehaw Contest"
];

const cowboyTasks=[
"Find cowboy boots","Get someone to yeehaw","Photo with hat","Start line dance",
"Convince someone bride is famous","Find someone from Texas","Find mustache",
"Find bolo tie","Find cowboy hat","Find someone named Jake","Find fringe jacket",
"Photo with security","Find mullet","Find someone from another country",
"Get stranger to sing","Find birthday person","Photo with bartender",
"Matching boots photo","Find denim outfit","Find truck owner",
"Find southern accent","Find whiskey drinker","Find big belt buckle"
];

let barList=[
"Tootsies Orchid Lounge",
"Jason Aldean's Kitchen",
"Luke's 32 Bridge",
"Kid Rock's Honky Tonk"
];

/* ---------------------------
TASK ASSIGNMENT
--------------------------- */

function assignTasks(){

let shuffled=[...taskPool].sort(()=>Math.random()-0.5);
let index=0;

players.forEach(p=>{
p.tasks=shuffled.slice(index,index+TASKS_PER_PLAYER);
p.completed=new Array(TASKS_PER_PLAYER).fill(false);
index+=TASKS_PER_PLAYER;
});

}

/* ---------------------------
PLAYERS
--------------------------- */

function initPlayers(){

let saved=localStorage.getItem("players");

if(saved){

players=JSON.parse(saved);

}else{

for(let i=1;i<=10;i++){

players.push({
name:"Player "+i,
drinks:0,
tasks:[],
completed:[]
});

}

assignTasks();

}

}

/* ---------------------------
SAVE
--------------------------- */

function save(){
localStorage.setItem("players",JSON.stringify(players));
}

/* ---------------------------
PLAYER SETUP
--------------------------- */

function renderPlayerSetup(){

let div=document.getElementById("playerSetup");
div.innerHTML="";

players.forEach((p,i)=>{

let input=document.createElement("input");
input.value=p.name;

input.onchange=()=>{
players[i].name=input.value;
save();
renderTasks();
renderLeaderboard();
};

div.appendChild(input);

});

}

/* ---------------------------
TASKS
--------------------------- */

function renderTasks(){

let c=document.getElementById("tasks");
c.innerHTML="";

players.forEach((p,pi)=>{

let html=`<div class="card"><b>${p.name}</b><br>`;

p.tasks.forEach((task,ti)=>{

html+=`
<div>
<input type="checkbox"
${p.completed[ti]?"checked":""}
onclick="completeTask(${pi},${ti})">
${task}
</div>`;

});

html+=`<button onclick="addDrink('${p.name}')">Add Drink</button></div>`;

c.innerHTML+=html;

});

}

/* ---------------------------
TASK COMPLETE
--------------------------- */

function completeTask(playerIndex,taskIndex){

if(!players[playerIndex].completed[taskIndex]){

players[playerIndex].completed[taskIndex]=true;

powerBar++;

triggerBrideEvent();

save();

}

renderTasks();

}

/* ---------------------------
RANDOM BRIDE EVENT
--------------------------- */

function triggerBrideEvent(){

if(Math.random()<0.2){

let event=brideEvents[Math.floor(Math.random()*brideEvents.length)];

setTimeout(()=>alert(event),200);

}

}

/* ---------------------------
DRINK TRACKING
--------------------------- */

function addDrink(name){

let p=players.find(x=>x.name===name);
p.drinks++;

save();
renderLeaderboard();

}

/* ---------------------------
LEADERBOARD (BUG FIXED)
--------------------------- */

function renderLeaderboard(){

let b=document.getElementById("leaderboard");
b.innerHTML="";

let sorted=[...players].sort((a,b)=>b.drinks-a.drinks);

sorted.forEach((p,i)=>{

let crown=i===0?"👑 ":"";

b.innerHTML+=`<div class="card">${crown}${p.name}: ${p.drinks}</div>`;

});

}

/* ---------------------------
DRINK GENERATOR
--------------------------- */

function generateDrink(){

document.getElementById("drinkDisplay").innerText=
drinks[Math.floor(Math.random()*drinks.length)];

}

/* ---------------------------
ANIMATED WHEEL
--------------------------- */

function spinWheel(){

let div=document.getElementById("wheelResult");

div.innerText="Spinning...";

let spins=25;
let i=0;

let interval=setInterval(()=>{

div.innerText=wheelOptions[Math.floor(Math.random()*wheelOptions.length)];

i++;

if(i>spins){

clearInterval(interval);

div.innerText=wheelOptions[Math.floor(Math.random()*wheelOptions.length)];

}

},80);

}

/* ---------------------------
KARAOKE
--------------------------- */

function generateKaraoke(){

document.getElementById("karaokeDisplay").innerText=
karaoke[Math.floor(Math.random()*karaoke.length)];

}

/* ---------------------------
CHECKLISTS
--------------------------- */

function renderChecklist(list,id){

let div=document.getElementById(id);

list.forEach(item=>{

let row=document.createElement("div");

let box=document.createElement("input");
box.type="checkbox";

row.appendChild(box);
row.append(" "+item);

div.appendChild(row);

});

}

/* ---------------------------
BAR TRACKER
--------------------------- */

function renderBars(){

let saved=localStorage.getItem("bars");

if(saved){
barList=JSON.parse(saved);
}

let div=document.getElementById("barTracker");
div.innerHTML="";

barList.forEach(bar=>{

let row=document.createElement("div");

let box=document.createElement("input");
box.type="checkbox";

row.appendChild(box);
row.append(" "+bar);

div.appendChild(row);

});

let input=document.createElement("input");
input.placeholder="Add a bar";

let btn=document.createElement("button");
btn.innerText="Add";

btn.onclick=()=>{

barList.push(input.value);
localStorage.setItem("bars",JSON.stringify(barList));

renderBars();

};

div.appendChild(document.createElement("br"));
div.appendChild(input);
div.appendChild(btn);

}

/* ---------------------------
PHOTO WALL
--------------------------- */

function loadPhotos(){

let saved=localStorage.getItem("photos");

if(saved){

let photos=JSON.parse(saved);

photos.forEach(src=>{

let img=document.createElement("img");
img.src=src;

document.getElementById("photoGrid").appendChild(img);

});

}

}

document.getElementById("photoUpload").addEventListener("change",function(){

let file=this.files[0];
let reader=new FileReader();

reader.onload=function(e){

let src=e.target.result;

let img=document.createElement("img");
img.src=src;

document.getElementById("photoGrid").appendChild(img);

let saved=localStorage.getItem("photos");
let photos=saved?JSON.parse(saved):[];

photos.push(src);

localStorage.setItem("photos",JSON.stringify(photos));

};

reader.readAsDataURL(file);

});

/* ---------------------------
INIT
--------------------------- */

initPlayers();
renderPlayerSetup();
renderTasks();
renderLeaderboard();
renderChecklist(cowboyTasks,"cowboyHunt");
renderBars();
loadPhotos();

</script>

</body>
</html>
